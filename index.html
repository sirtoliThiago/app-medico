<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppMedico - Auxílio Básico e Rápido</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class', // Ativa o modo escuro por classe
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- PWA Meta tags básicos -->
    <meta name="theme-color" content="#0ea5e9">
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col transition-colors duration-300">
    <!-- Header -->
    <header class="clean-header sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="router.navigate('home')">
            <div class="bg-primary text-white p-2 rounded-xl">
                <i class="ph-fill ph-heartbeat text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800 dark:text-white tracking-tight">App<span class="text-primary">Medico</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="darkModeToggle" class="text-slate-500 dark:text-slate-400 hover:text-primary transition-colors p-2 bg-slate-100 dark:bg-slate-800 rounded-full">
                <i class="ph-fill ph-moon text-xl" id="darkModeIcon"></i>
            </button>
            <button class="text-slate-600 dark:text-slate-300 hover:text-primary transition-colors">
                <i class="ph ph-list text-3xl"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Container (Dynamic Route Rendering) -->
    <main id="app-content" class="flex-grow w-full max-w-3xl mx-auto pb-20 relative">
        <!-- Renderizado via app.js -->
    </main>

    <!-- App Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registrado com sucesso!', reg.scope))
                    .catch(err => console.error('Erro ao registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
